<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Manager</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;padding:2rem}
  :root{--accent:#1D9E75;--accent-light:#E1F5EE;--accent-dark:#0F6E56;--bg:#fff;--surface:#f9f9f9;--border:#e0e0e0;--text:#1a1a1a;--muted:#777}
  #app{max-width:900px;margin:0 auto;background:var(--bg);border-radius:16px;border:1px solid var(--border);padding:2rem}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  .header h1{font-size:22px;font-weight:600;color:var(--text)}
  .header span{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px 12px}
  .toolbar{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
  #search{flex:1;min-width:160px;padding:0 12px;height:38px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;color:var(--text);outline:none}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
  .filter-btn{height:38px;padding:0 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:var(--muted);transition:all .15s}
  .filter-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);font-weight:600}
  .add-btn{height:38px;padding:0 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .add-btn:hover{background:var(--accent-dark)}
  select.sort-select{height:38px;padding:0 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--muted);cursor:pointer;outline:none}
  .contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;position:relative;transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
  .card-actions{position:absolute;top:10px;right:10px;display:none;gap:6px}
  .card:hover .card-actions{display:flex}
  .card-actions button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .card-actions button:hover{background:#fff;color:var(--text)}
  .avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;margin-bottom:12px}
  .card-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-role{font-size:12px;color:var(--muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
  .tag-work{background:#E6F1FB;color:#0C447C}
  .tag-friend{background:#E1F5EE;color:#085041}
  .tag-family{background:#FAEEDA;color:#633806}
  .card-info{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
  .card-info p{font-size:12px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{text-align:center;padding:3rem 0;color:var(--muted);font-size:14px;grid-column:1/-1}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{background:#fff;border-radius:16px;border:1px solid var(--border);padding:1.75rem;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
  .modal h3{font-size:17px;font-weight:600;margin-bottom:1.25rem;color:var(--text)}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
  .form-group input,.form-group select{width:100%;padding:0 10px;height:36px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem}
  .btn-cancel{height:36px;padding:0 16px;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:var(--muted)}
  .btn-cancel:hover{background:var(--surface)}
  .btn-save{height:36px;padding:0 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-save:hover{background:var(--accent-dark)}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <h1>&#128101; Contact Manager</h1>
    <span id="count">0 contacts</span>
  </div>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search name, email, or role…" oninput="render()">
    <select class="sort-select" id="sort" onchange="render()">
      <option value="name">Sort: A–Z</option>
      <option value="recent">Sort: Recent</option>
    </select>
    <button class="filter-btn active" data-tag="all" onclick="setTag(this)">All</button>
    <button class="filter-btn" data-tag="work" onclick="setTag(this)">Work</button>
    <button class="filter-btn" data-tag="friend" onclick="setTag(this)">Friends</button>
    <button class="filter-btn" data-tag="family" onclick="setTag(this)">Family</button>
    <button class="add-btn" onclick="openModal()">+ Add Contact</button>
  </div>
  <div class="contact-grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">New Contact</h3>
    <div class="form-group"><label>Full Name *</label><input id="f-name" placeholder="Maya Rodriguez"></div>
    <div class="form-group"><label>Role / Title</label><input id="f-role" placeholder="VP of Engineering"></div>
    <div class="form-group"><label>Email</label><input id="f-email" type="email" placeholder="maya@acme.com"></div>
    <div class="form-group"><label>Phone</label><input id="f-phone" placeholder="+91 98765 43210"></div>
    <div class="form-group"><label>Category</label>
      <select id="f-tag">
        <option value="work">Work</option>
        <option value="friend">Friend</option>
        <option value="family">Family</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  {bg:'#E6F1FB',text:'#0C447C'},
  {bg:'#E1F5EE',text:'#085041'},
  {bg:'#FAEEDA',text:'#633806'},
  {bg:'#FBEAF0',text:'#72243E'},
  {bg:'#EEEDFE',text:'#3C3489'},
  {bg:'#EAF3DE',text:'#27500A'},
];

let contacts = [
  {id:1,name:'Arjun Sharma',role:'Product Designer',email:'arjun@design.io',phone:'+91 98001 12345',tag:'work',ts:1714000000},
  {id:2,name:'Priya Nair',role:'Software Engineer',email:'priya@techco.in',phone:'+91 99001 22222',tag:'work',ts:1714100000},
  {id:3,name:'Rohan Mehta',role:'College friend',email:'rohan.m@gmail.com',phone:'+91 97001 33333',tag:'friend',ts:1714200000},
  {id:4,name:'Ananya Iyer',role:'Sister',email:'ananya@family.in',phone:'+91 96001 44444',tag:'family',ts:1714300000},
  {id:5,name:'Kabir Singh',role:'Marketing Lead',email:'kabir@brand.co',phone:'+91 95001 55555',tag:'work',ts:1714400000},
  {id:6,name:'Meera Joshi',role:'Neighbour',email:'meera.j@gmail.com',phone:'+91 94001 66666',tag:'friend',ts:1714500000},
];

let nextId = 7, editId = null, activeTag = 'all';

function initials(n) {
  return n.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function colorFor(n) {
  let h = 0;
  for (let c of n) h = (h << 5) - h + c.charCodeAt(0);
  return COLORS[Math.abs(h) % COLORS.length];
}

function setTag(btn) {
  activeTag = btn.dataset.tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = contacts.filter(c => {
    const tagOk = activeTag === 'all' || c.tag === activeTag;
    const searchOk = !q || (c.name + c.role + c.email).toLowerCase().includes(q);
    return tagOk && searchOk;
  });
  if (sort === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
  else list.sort((a, b) => b.ts - a.ts);

  const g = document.getElementById('grid');
  document.getElementById('count').textContent = contacts.length + ' contact' + (contacts.length !== 1 ? 's' : '');

  if (!list.length) {
    g.innerHTML = '<div class="empty">No contacts found.</div>';
    return;
  }

  g.innerHTML = list.map(c => {
    const col = colorFor(c.name);
    const tagLabel = c.tag === 'work' ? 'Work' : c.tag === 'friend' ? 'Friend' : 'Family';
    return `
      <div class="card">
        <div class="card-actions">
          <button title="Edit" onclick="editContact(${c.id})">&#9998;</button>
          <button title="Delete" onclick="deleteContact(${c.id})" style="color:#A32D2D">&#10005;</button>
        </div>
        <div class="avatar" style="background:${col.bg};color:${col.text}">${initials(c.name)}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-role">${c.role || '—'}</div>
        <span class="card-tag tag-${c.tag}">${tagLabel}</span>
        <div class="card-info">
          ${c.email ? `<p>&#9993; ${c.email}</p>` : ''}
          ${c.phone ? `<p>&#9742; ${c.phone}</p>` : ''}
        </div>
      </div>`;
  }).join('');
}

function openModal(c = null) {
  editId = c ? c.id : null;
  document.getElementById('modal-title').textContent = c ? 'Edit Contact' : 'New Contact';
  document.getElementById('f-name').value = c ? c.name : '';
  document.getElementById('f-role').value = c ? c.role : '';
  document.getElementById('f-email').value = c ? c.email : '';
  document.getElementById('f-phone').value = c ? c.phone : '';
  document.getElementById('f-tag').value = c ? c.tag : 'work';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editId = null;
}

function saveContact() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required!'); return; }
  const obj = {
    name,
    role: document.getElementById('f-role').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    tag: document.getElementById('f-tag').value,
    ts: Date.now()
  };
  if (editId) {
    Object.assign(contacts.find(c => c.id === editId), obj);
  } else {
    contacts.push({ id: nextId++, ...obj });
  }
  closeModal();
  render();
}

function editContact(id) { openModal(contacts.find(c => c.id === id)); }

function deleteContact(id) {
  if (confirm('Remove this contact?')) {
    contacts = contacts.filter(c => c.id !== id);
    render();
  }
}

// Close modal on background click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
</body>
</html>
